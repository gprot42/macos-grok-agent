<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep black with subtle dark-blue centre -->
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%"   stop-color="#181830"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>

    <!-- Glow for the central mark -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00CFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00CFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arm glow filter -->
    <filter id="armGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer rim glow -->
    <filter id="rimGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="roundedRect">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <g clip-path="url(#roundedRect)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle centre glow halo -->
    <ellipse cx="512" cy="500" rx="380" ry="370" fill="url(#glowGrad)"/>

    <!-- Very faint grid lines for depth (Grok-style) -->
    <g stroke="#1A1A40" stroke-width="1" opacity="0.55">
      <line x1="0"    y1="256"  x2="1024" y2="256"/>
      <line x1="0"    y1="512"  x2="1024" y2="512"/>
      <line x1="0"    y1="768"  x2="1024" y2="768"/>
      <line x1="256"  y1="0"    x2="256"  y2="1024"/>
      <line x1="512"  y1="0"    x2="512"  y2="1024"/>
      <line x1="768"  y1="0"    x2="768"  y2="1024"/>
    </g>

    <!-- ── X arms (two crossing bars, tapered/rounded) ── -->
    <!-- Each arm: a rotated thick rounded rect centred on 512,512 -->
    <!-- Arm 1: top-left → bottom-right (\) -->
    <g filter="url(#armGlow)">
      <rect x="471" y="158" width="82" height="708" rx="41" ry="41"
            fill="white" opacity="0.97"
            transform="rotate(45 512 512)"/>
    </g>
    <!-- Arm 2: top-right → bottom-left (/) -->
    <g filter="url(#armGlow)">
      <rect x="471" y="158" width="82" height="708" rx="41" ry="41"
            fill="white" opacity="0.97"
            transform="rotate(-45 512 512)"/>
    </g>

    <!-- Centre occlusion: small dark circle punches a subtle hole so
         the intersection feels intentional rather than just bright -->
    <circle cx="512" cy="512" r="46" fill="#181830" opacity="0.55"/>

    <!-- ── Neural nodes at each arm tip ── -->
    <!-- Top node -->
    <g filter="url(#nodeGlow)">
      <circle cx="512" cy="190" r="32" fill="#00CFFF" opacity="0.95"/>
      <circle cx="512" cy="190" r="18" fill="white"/>
    </g>
    <!-- Bottom node -->
    <g filter="url(#nodeGlow)">
      <circle cx="512" cy="834" r="32" fill="#00CFFF" opacity="0.95"/>
      <circle cx="512" cy="834" r="18" fill="white"/>
    </g>
    <!-- Left node -->
    <g filter="url(#nodeGlow)">
      <circle cx="190" cy="512" r="32" fill="#00CFFF" opacity="0.95"/>
      <circle cx="190" cy="512" r="18" fill="white"/>
    </g>
    <!-- Right node -->
    <g filter="url(#nodeGlow)">
      <circle cx="834" cy="512" r="32" fill="#00CFFF" opacity="0.95"/>
      <circle cx="834" cy="512" r="18" fill="white"/>
    </g>

    <!-- ── Four diagonal connector arcs (neural synapses) ── -->
    <!-- These arc between adjacent nodes, sitting slightly inward -->
    <g stroke="#00CFFF" stroke-width="5" fill="none" opacity="0.45"
       filter="url(#armGlow)">
      <!-- top → right -->
      <path d="M 560 232 Q 740 340 794 468"/>
      <!-- right → bottom -->
      <path d="M 794 556 Q 740 684 560 792"/>
      <!-- bottom → left -->
      <path d="M 464 792 Q 284 684 230 556"/>
      <!-- left → top -->
      <path d="M 230 468 Q 284 340 464 232"/>
    </g>

    <!-- Small secondary nodes at arc midpoints for extra depth -->
    <g fill="#00CFFF" opacity="0.60">
      <circle cx="716" cy="335" r="10"/>
      <circle cx="716" cy="689" r="10"/>
      <circle cx="308" cy="689" r="10"/>
      <circle cx="308" cy="335" r="10"/>
    </g>

    <!-- ── Outer glowing rim (macOS style inner border) ── -->
    <rect x="28" y="28" width="968" height="968" rx="204" ry="204"
          fill="none" stroke="#2A2A60" stroke-width="3"
          opacity="0.7" filter="url(#rimGlow)"/>
  </g>
</svg>
